{% extends "base.html" %}
{% load static %}

{% block title %}Edit Member | FlexCore{% endblock %}

{% block content %}

<style>

body{
    background:#0f172a;
}

.edit-section{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:70px 0;
}

.glass-card{

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.12);

    border-radius:30px;

    box-shadow:
    0 15px 45px rgba(0,0,0,.45);

    overflow:hidden;

}

.card-header-custom{

    background:linear-gradient(135deg,#f97316,#fb923c);

    padding:35px;

    text-align:center;

}

.card-header-custom h2{

    color:white;

    font-weight:700;

}

.card-header-custom p{

    color:white;

    opacity:.85;

}

.form-control,
.form-select{

    background:rgba(255,255,255,.05);

    border:1px solid rgba(255,255,255,.1);

    color:white;

    border-radius:15px;

    padding:15px;

}

.form-control:focus,
.form-select:focus{

    background:rgba(255,255,255,.08);

    color:white;

    border-color:#f97316;

    box-shadow:0 0 15px rgba(249,115,22,.4);

}

.form-label{

    color:white;

    font-weight:600;

}

.btn-save{

    background:linear-gradient(135deg,#f97316,#fb923c);

    border:none;

    border-radius:15px;

    padding:14px;

    color:white;

    font-weight:600;

    transition:.3s;

}

.btn-save:hover{

    transform:translateY(-3px);

    box-shadow:0 10px 25px rgba(249,115,22,.45);

}

.btn-back{

    border-radius:15px;

    padding:14px;

}

.profile-circle{

    width:90px;

    height:90px;

    border-radius:50%;

    background:rgba(255,255,255,.15);

    display:flex;

    justify-content:center;

    align-items:center;

    margin:auto;

    font-size:40px;

    color:white;

    border:2px solid rgba(255,255,255,.15);

}

</style>

<section class="edit-section">

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-10">

<div class="glass-card">

<div class="card-header-custom">

<div class="profile-circle">

<i class="fa-solid fa-user-pen"></i>

</div>

<h2 class="mt-4">

Edit Member

</h2>

<p>

Update member information

</p>

</div>

<div class="card-body p-5">

<form method="POST">

{% csrf_token %}

<div class="row">

<div class="col-md-6 mb-4">

<label class="form-label">

Full Name

</label>

<input

type="text"

name="name"

value="{{ member.name }}"

class="form-control"

required>

</div>

<div class="col-md-6 mb-4">

<label class="form-label">

Email

</label>

<input

type="email"

name="email"

value="{{ member.email }}"

class="form-control"

required>

</div>

<div class="col-md-6 mb-4">

<label class="form-label">

Phone Number

</label>

<input

type="text"

name="phone"

value="{{ member.phone }}"

class="form-control"

required>

</div>

<div class="col-md-6 mb-4">

<label class="form-label">

Age

</label>

<input

type="number"

name="age"

value="{{ member.age }}"

class="form-control">

</div>

<div class="col-md-6 mb-4">

<label class="form-label">

Gender

</label>

<select
name="gender"
class="form-select">

<option {% if member.gender == "Male" %}selected{% endif %}>Male</option>

<option {% if member.gender == "Female" %}selected{% endif %}>Female</option>

<option {% if member.gender == "Other" %}selected{% endif %}>Other</option>

</select>

</div>

<div class="col-md-6 mb-4">

<label class="form-label">

Membership Plan

</label>

<select
name="membership_plan"
class="form-select">

{% for plan in plans %}

<option
value="{{ plan.id }}"
{% if member.membership_plan.id == plan.id %}selected{% endif %}>

{{ plan.name }}

</option>

{% endfor %}

</select>

</div>

<div class="col-md-6 mb-4">

<label class="form-label">

Joining Date

</label>

<input

type="date"

name="joining_date"

value="{{ member.joining_date|date:'Y-m-d' }}"

class="form-control">

</div>

<div class="col-md-6 mb-4">

<label class="form-label">

Expiry Date

</label>

<input

type="date"

name="expiry_date"

value="{{ member.expiry_date|date:'Y-m-d' }}"

class="form-control">

</div>

<div class="col-md-12 mb-4">

<label class="form-label">

Membership Status

</label>

<select
name="membership_status"
class="form-select">

<option
value="Active"
{% if member.membership_status == "Active" %}selected{% endif %}>

Active

</option>

<option
value="Expired"
{% if member.membership_status == "Expired" %}selected{% endif %}>

Expired

</option>

</select>

</div>

<div class="d-flex justify-content-between mt-4">

<a
href="{% url 'view_members' %}"
class="btn btn-outline-light btn-back">

<i class="fa-solid fa-arrow-left"></i>

Back

</a>

<button
type="submit"
class="btn btn-save">

<i class="fa-solid fa-floppy-disk"></i>

Update Member

</button>

</div>

</form>

</div>

</div>

</div>

</div>

</div>

</section>

{% endblock %}
