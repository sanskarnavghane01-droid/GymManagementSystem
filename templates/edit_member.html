{% extends 'base.html' %}

{% block title %}
Edit Member
{% endblock %}

{% block content %}

<div class="container mt-5 mb-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow-lg border-0 rounded-4">

                <div class="card-header bg-warning text-dark text-center rounded-top-4">
                    <h3 class="mb-0">
                        <i class="bi bi-pencil-square"></i>
                        Edit Member
                    </h3>
                </div>

                <div class="card-body p-4">

                    <form method="POST">

                        {% csrf_token %}

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label fw-bold">
                                    Full Name
                                </label>

                                <input
                                    type="text"
                                    class="form-control"
                                    name="name"
                                    value="{{ member.name }}"
                                    required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label fw-bold">
                                    Email
                                </label>

                                <input
                                    type="email"
                                    class="form-control"
                                    name="email"
                                    value="{{ member.email }}"
                                    required>

                            </div>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label fw-bold">
                                    Phone Number
                                </label>

                                <input
                                    type="text"
                                    class="form-control"
                                    name="phone"
                                    value="{{ member.phone }}"
                                    required>

                            </div>

                            <div class="col-md-3 mb-3">

                                <label class="form-label fw-bold">
                                    Age
                                </label>

                                <input
                                    type="number"
                                    class="form-control"
                                    name="age"
                                    value="{{ member.age }}"
                                    required>

                            </div>

                            <div class="col-md-3 mb-3">

                                <label class="form-label fw-bold">
                                    Gender
                                </label>

                                <select
                                    class="form-select"
                                    name="gender">

                                    <option value="Male"
                                        {% if member.gender == "Male" %}
                                        selected
                                        {% endif %}>
                                        Male
                                    </option>

                                    <option value="Female"
                                        {% if member.gender == "Female" %}
                                        selected
                                        {% endif %}>
                                        Female
                                    </option>

                                    <option value="Other"
                                        {% if member.gender == "Other" %}
                                        selected
                                        {% endif %}>
                                        Other
                                    </option>

                                </select>

                            </div>

                        </div>

                        <div class="mb-3">

                            <label class="form-label fw-bold">
                                Membership Plan
                            </label>

                            <select
                                class="form-select"
                                name="membership_plan">

                                {% for plan in plans %}

                                <option
                                    value="{{ plan.id }}"
                                    {% if member.membership_plan.id == plan.id %}
                                    selected
                                    {% endif %}>

                                    {{ plan.name }}

                                </option>

                                {% endfor %}

                            </select>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label fw-bold">
                                    Joining Date
                                </label>

                                <input
                                    type="date"
                                    class="form-control"
                                    name="joining_date"
                                    value="{{ member.joining_date|date:'Y-m-d' }}"
                                    required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label fw-bold">
                                    Expiry Date
                                </label>

                                <input
                                    type="date"
                                    class="form-control"
                                    name="expiry_date"
                                    value="{{ member.expiry_date|date:'Y-m-d' }}"
                                    required>

                            </div>

                        </div>

                        <div class="mb-4">

                            <label class="form-label fw-bold">
                                Membership Status
                            </label>

                            <input
                                type="text"
                                class="form-control"
                                value="{{ member.membership_status }}"
                                readonly>

                        </div>

                        <div class="d-flex justify-content-between">

                            <a href="{% url 'view_members' %}"
                               class="btn btn-secondary">

                                <i class="bi bi-arrow-left"></i>
                                Back

                            </a>

                            <button
                                type="submit"
                                class="btn btn-warning">

                                <i class="bi bi-save"></i>
                                Update Member

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
