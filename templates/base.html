<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}Modern gym management system for members, trainers, memberships, attendance, and reporting.{% endblock %}" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    :root {
      --bg:#0b0f19;
      --surface:#111725;
      --surface-2:#151d2e;
      --border:#1f2a44;
      --text:#e6ebf5;
      --muted:#98a2b8;
      --primary:#f97316;
      --primary-2:#fb923c;
      --accent:#22d3ee;
      --grad:linear-gradient(135deg,#f97316,#ef4444 60%,#a855f7);
      --ring:0 10px 30px -12px rgba(249,115,22,.55);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body { min-height: 100vh; }
    a { text-decoration: none; color: inherit; }
    h1, h2, h3, .display-4, .display-5 {
      font-family: 'Space Grotesk', 'Inter', sans-serif;
      letter-spacing: -0.02em;
    }

    .text-muted-2 { color: var(--muted)!important; }
    .section { padding: 96px 0; }
    .eyebrow {
      display: inline-block;
      padding: .35rem .75rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: .8rem;
      color: var(--muted);
      background: rgba(255,255,255,.02);
    }
    .grad-text {
      background: var(--grad);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .navbar {
      background: rgba(11,15,25,.7);
      backdrop-filter: saturate(140%) blur(14px);
      border-bottom: 1px solid transparent;
      transition: .3s;
    }
    .navbar.scrolled { border-bottom-color: var(--border); background: rgba(11,15,25,.85); }
    .navbar-brand {
      font-family: 'Space Grotesk';
      font-weight: 700;
      color: var(--text)!important;
      display: flex;
      align-items: center;
      gap: .55rem;
    }
    .brand-mark {
      width: 32px;
      height: 32px;
      border-radius: 9px;
      background: var(--grad);
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 800;
    }
    .navbar .nav-link { color: var(--muted)!important; font-weight: 500; padding: .5rem 1rem!important; transition: .2s; }
    .navbar .nav-link:hover { color: var(--text)!important; }
    .btn-primary-grad {
      background: var(--grad);
      border: none;
      color: #fff;
      font-weight: 600;
      padding: .7rem 1.25rem;
      border-radius: 12px;
      box-shadow: var(--ring);
      transition: transform .2s, box-shadow .2s;
    }
    .btn-primary-grad:hover { transform: translateY(-2px); color: #fff; box-shadow: 0 16px 40px -14px rgba(249,115,22,.7); }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: .7rem 1.25rem;
      border-radius: 12px;
      font-weight: 600;
      transition: .2s;
    }
    .btn-ghost:hover { border-color: var(--primary); color: var(--text); }

    .hero { position: relative; overflow: hidden; padding: 150px 0 90px; }
    .hero::before {
      content: "";
      position: absolute;
      inset: -20% -10% auto -10%;
      height: 520px;
      background: radial-gradient(60% 60% at 30% 40%, rgba(249,115,22,.25), transparent 60%), radial-gradient(50% 50% at 80% 20%, rgba(168,85,247,.22), transparent 60%);
      filter: blur(10px);
      z-index: 0;
    }
    .hero .container { position: relative; z-index: 1; }
    .hero h1 { font-size: clamp(2.4rem,5vw,4.2rem); font-weight: 800; line-height: 1.05; }
    .hero p.lead { color: var(--muted); font-size: 1.15rem; max-width: 640px; }
    .hero-visual {
      border: 1px solid var(--border);
      border-radius: 20px;
      background: linear-gradient(180deg, var(--surface), var(--surface-2));
      padding: 18px;
      box-shadow: 0 30px 80px -30px rgba(0,0,0,.6);
    }
    .stat-chip { display:flex; align-items:center; gap:.6rem; padding:.7rem 1rem; border:1px solid var(--border); border-radius:12px; background:var(--surface); color:var(--muted); font-size:.9rem; }
    .stat-chip i { color: var(--primary); }

    .mock { background:#0e1524; border:1px solid var(--border); border-radius:14px; overflow:hidden; }
    .mock-top { display:flex; gap:6px; padding:10px 14px; border-bottom:1px solid var(--border); background:#0b111e; }
    .mock-top span { width:11px; height:11px; border-radius:50%; background:#334155; }
    .mock-top span:nth-child(1){background:#ef4444}.mock-top span:nth-child(2){background:#f59e0b}.mock-top span:nth-child(3){background:#22c55e}
    .mock-body { display:grid; grid-template-columns:180px 1fr; min-height:320px; }
    .mock-side { background:#0b111e; border-right:1px solid var(--border); padding:14px; }
    .mock-side .item { display:flex; align-items:center; gap:.55rem; color:var(--muted); padding:.5rem .6rem; border-radius:8px; font-size:.85rem; margin-bottom:2px; }
    .mock-side .item.active { background:rgba(249,115,22,.12); color:#fff; }
    .mock-main { padding:16px; display:grid; gap:12px; grid-template-columns:repeat(3,1fr); align-content:start; }
    .mock-card { background:#0f1729; border:1px solid var(--border); border-radius:10px; padding:12px; }
    .mock-card .k { font-size:.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; }
    .mock-card .v { font-family:'Space Grotesk'; font-size:1.35rem; font-weight:700; }
    .mock-chart { grid-column:1/-1; height:130px; background:linear-gradient(180deg,rgba(249,115,22,.15),transparent); border:1px solid var(--border); border-radius:10px; position:relative; overflow:hidden; }
    .mock-chart svg { width:100%; height:100%; }

    .feature-card { background:linear-gradient(180deg,var(--surface),var(--surface-2)); border:1px solid var(--border); border-radius:18px; padding:28px; height:100%; transition:transform .3s ease, border-color .3s ease, box-shadow .3s ease; position:relative; overflow:hidden; }
    .feature-card::after { content:""; position:absolute; inset:auto -30% -60% auto; width:220px; height:220px; background:radial-gradient(circle,rgba(249,115,22,.18),transparent 60%); opacity:0; transition:opacity .3s; }
    .feature-card:hover { transform:translateY(-6px); border-color:rgba(249,115,22,.5); box-shadow:0 20px 50px -25px rgba(249,115,22,.4); }
    .feature-card:hover::after { opacity:1; }
    .feature-icon { width:52px; height:52px; border-radius:14px; display:grid; place-items:center; background:rgba(249,115,22,.12); color:var(--primary); font-size:1.25rem; margin-bottom:16px; }
    .feature-card h5 { font-weight:700; margin-bottom:.5rem; }
    .feature-card p { color:var(--muted); margin:0; font-size:.95rem; }

    .stats { background:linear-gradient(180deg,#0d1322,#0b0f19); border-top:1px solid var(--border); border-bottom:1px solid var(--border); }
    .stat { padding:24px; text-align:center; }
    .stat .num { font-family:'Space Grotesk'; font-size:clamp(2rem,4vw,3rem); font-weight:800; background:var(--grad); -webkit-background-clip:text; color:transparent; }
    .stat .lbl { color:var(--muted); font-weight:500; text-transform:uppercase; letter-spacing:.1em; font-size:.78rem; margin-top:.35rem; }

    .about-card { background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:22px; display:flex; gap:14px; align-items:flex-start; }
    .about-card i { color:var(--primary); font-size:1.1rem; margin-top:4px; }

    .contact-info { background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:28px; height:100%; }
    .contact-info .row-info { display:flex; gap:14px; align-items:flex-start; padding:14px 0; border-top:1px solid var(--border); }
    .contact-info .row-info:first-of-type { border-top:none; }
    .contact-info .icon { width:42px; height:42px; border-radius:10px; background:rgba(249,115,22,.12); color:var(--primary); display:grid; place-items:center; flex:none; }
    .form-control,.form-control:focus { background:var(--surface-2); border:1px solid var(--border); color:var(--text); border-radius:12px; padding:.85rem 1rem; box-shadow:none; }
    .form-control:focus { border-color:var(--primary); }
    .form-control::placeholder { color:#64748b; }

    footer { background:#080b13; border-top:1px solid var(--border); padding:60px 0 24px; color:var(--muted); }
    footer h6 { color:var(--text); font-weight:700; margin-bottom:1rem; letter-spacing:.02em; }
    footer a { color:var(--muted); display:block; padding:.3rem 0; transition:.2s; }
    footer a:hover { color:var(--primary); }
    .social a { display:inline-grid; place-items:center; width:38px; height:38px; border:1px solid var(--border); border-radius:10px; margin-right:.4rem; transition:.2s; }
    .social a:hover { background:var(--primary); color:#fff; border-color:var(--primary); }
    .footer-bottom { border-top:1px solid var(--border); margin-top:40px; padding-top:20px; font-size:.9rem; display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px; }

    .reveal { opacity:0; transform:translateY(24px); transition:opacity .7s ease, transform .7s ease; }
    .reveal.in { opacity:1; transform:none; }

    @media (max-width: 767px) {
      .section { padding:64px 0; }
      .hero { padding:120px 0 60px; }
      .mock-body { grid-template-columns:1fr; }
      .mock-side { display:none; }
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  {% if messages %}
  <div style="position:fixed; right:20px; top:20px; z-index:9999; min-width:240px;">
    {% for message in messages %}
      <div class="alert alert-{{ message.tags }}" role="alert" style="margin-bottom:6px;">{{ message }}</div>
    {% endfor %}
  </div>
  {% endif %}
  {% block content %}{% endblock %}
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
