{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card border-0 shadow-lg" style="background: #111725;">
        <div class="card-body p-4">
          <h1 class="mb-4">{{ title }}</h1>
          <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="mt-4">
              <button type="submit" class="btn btn-primary-grad">Save</button>
              <a href="{% url 'trainer_list' %}" class="btn btn-ghost ms-2">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
