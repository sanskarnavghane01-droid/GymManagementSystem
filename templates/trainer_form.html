{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card border-0 shadow-lg" style="background: linear-gradient(180deg, #111725, #0d1322); border: 1px solid #1f2a44; border-radius: 20px;">
        <div class="card-body p-4 p-md-5">
          <div class="mb-4">
            <h1 class="mb-2">{{ title }}</h1>
            <p class="text-muted-2 mb-0">Fill in the trainer details below.</p>
          </div>
          <form method="post" class="mt-3">
            {% csrf_token %}
            <div class="row g-3">
              {% for field in form %}
                <div class="col-12">
                  <label for="{{ field.id_for_label }}" class="form-label text-muted-2">{{ field.label }}</label>
                  {{ field }}
                  {% if field.errors %}
                    <div class="text-danger small mt-1">{{ field.errors|striptags }}</div>
                  {% endif %}
                </div>
              {% endfor %}
            </div>
            <div class="mt-4 d-flex flex-wrap gap-2">
              <button type="submit" class="btn btn-primary-grad">Save</button>
              <a href="{% url 'trainer_list' %}" class="btn btn-ghost">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
