{% extends 'base.html' %}

{% block title %}
Add Member
{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card">

                <div class="card-header text-center">

                    <h3>
                        <i class="bi bi-person-plus-fill"></i>
                        Add New Member
                    </h3>

                </div>

                <div class="card-body">

                    <form method="POST">

                        {% csrf_token %}

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Full Name
                                </label>

                                <input
                                    type="text"
                                    class="form-control"
                                    name="name"
                                    required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Email
                                </label>

                                <input
                                    type="email"
                                    class="form-control"
                                    name="email"
                                    required>

                            </div>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Phone Number
                                </label>

                                <input
                                    type="text"
                                    class="form-control"
                                    name="phone"
                                    required>

                            </div>

                            <div class="col-md-3 mb-3">

                                <label class="form-label">
                                    Age
                                </label>

                                <input
                                    type="number"
                                    class="form-control"
                                    name="age"
                                    required>

                            </div>

                            <div class="col-md-3 mb-3">

                                <label class="form-label">
                                    Gender
                                </label>

                                <select
                                    class="form-select"
                                    name="gender"
                                    required>

                                    <option value="">Select</option>
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                    <option value="Other">Other</option>

                                </select>

                            </div>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Membership Plan
                            </label>

                            <select
                                class="form-select"
                                name="membership_plan"
                                required>

                                <option value="">Select Plan</option>

                                {% for plan in plans %}

                                <option value="{{ plan.id }}">
                                    {{ plan.name }}
                                </option>

                                {% endfor %}

                            </select>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Joining Date
                                </label>

                                <input
                                    type="date"
                                    class="form-control"
                                    name="joining_date"
                                    required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Expiry Date
                                </label>

                                <input
                                    type="date"
                                    class="form-control"
                                    name="expiry_date"
                                    required>

                            </div>

                        </div>

                        <div class="d-grid gap-2 mt-4">

                            <button
                                type="submit"
                                class="btn btn-primary btn-lg">

                                <i class="bi bi-check-circle"></i>

                                Save Member

                            </button>

                            <a
                                href="{% url 'view_members' %}"
                                class="btn btn-secondary">

                                <i class="bi bi-arrow-left"></i>

                                Back to Members

                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

    
{% endblock %}
