{% extends "base.html" %}

{% block title %}Add Member | FlexCore{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-xl-10 col-lg-11">

            <div class="glass-card p-5">

                <!-- Header -->
                <div class="d-flex justify-content-between align-items-center mb-5">

                    <div>

                        <span class="badge bg-warning text-dark px-3 py-2 mb-3">
                            MEMBER MANAGEMENT
                        </span>

                        <h1 class="display-5 fw-bold text-white">
                            Add New Member
                        </h1>

                        <p class="text-light opacity-75">
                            Register a new member into FlexCore Gym Management.
                        </p>

                    </div>

                    <div class="profile-icon">

                        <i class="fa-solid fa-user-plus"></i>

                    </div>

                </div>

                <form method="POST">

                    {% csrf_token %}

                    <div class="row g-4">

                        <!-- Name -->
                        <div class="col-md-6">

                            <div class="floating-group">

                                <i class="fa-solid fa-user input-icon"></i>

                                <input
                                    type="text"
                                    class="form-control glass-input"
                                    name="name"
                                    required
                                    placeholder=" ">

                                <label>Full Name</label>

                            </div>

                        </div>

                        <!-- Email -->

                        <div class="col-md-6">

                            <div class="floating-group">

                                <i class="fa-solid fa-envelope input-icon"></i>

                                <input
                                    type="email"
                                    class="form-control glass-input"
                                    name="email"
                                    required
                                    placeholder=" ">

                                <label>Email Address</label>

                            </div>

                        </div>

                        <!-- Phone -->

                        <div class="col-md-6">

                            <div class="floating-group">

                                <i class="fa-solid fa-phone input-icon"></i>

                                <input
                                    type="text"
                                    class="form-control glass-input"
                                    name="phone"
                                    required
                                    placeholder=" ">

                                <label>Phone Number</label>

                            </div>

                        </div>

                        <!-- Age -->

                        <div class="col-md-6">

                            <div class="floating-group">

                                <i class="fa-solid fa-cake-candles input-icon"></i>

                                <input
                                    type="number"
                                    class="form-control glass-input"
                                    name="age"
                                    required
                                    placeholder=" ">

                                <label>Age</label>

                            </div>

                        </div>

                        <!-- Gender -->

                        <div class="col-md-6">

                            <div class="floating-group">

                                <i class="fa-solid fa-venus-mars input-icon"></i>

                                <select
                                    class="form-select glass-input"
                                    name="gender"
                                    required>

                                    <option selected disabled>Select Gender</option>

                                    <option>Male</option>

                                    <option>Female</option>

                                    <option>Other</option>

                                </select>

                            </div>

                        </div>

                        <!-- Membership -->

                        <div class="col-md-6">

                            <div class="floating-group">

                                <i class="fa-solid fa-id-card input-icon"></i>

                                <select
                                    class="form-select glass-input"
                                    name="membership_plan"
                                    required>

                                    <option selected disabled>Select Membership</option>

                                    {% for plan in plans %}
                                    <option value="{{ plan.id }}">
                                        {{ plan.name }}
                                    </option>
                                    {% endfor %}

                                </select>

                            </div>

                        </div>

                        <!-- Joining -->

                        <div class="col-md-6">

                            <div class="floating-group">

                                <i class="fa-solid fa-calendar-plus input-icon"></i>

                                <input
                                    type="date"
                                    class="form-control glass-input"
                                    name="joining_date"
                                    required>

                            </div>

                        </div>

                        <!-- Expiry -->

                        <div class="col-md-6">

                            <div class="floating-group">

                                <i class="fa-solid fa-calendar-xmark input-icon"></i>

                                <input
                                    type="date"
                                    class="form-control glass-input"
                                    name="expiry_date"
                                    required>

                            </div>

                        </div>

                    </div>

                    <hr class="border-secondary my-5">

                    <div class="d-flex justify-content-between">

                        <a href="{% url 'view_members' %}"
                           class="btn btn-outline-light px-4">

                            <i class="fa-solid fa-arrow-left"></i>

                            Back

                        </a>

                        <button class="btn btn-premium px-5">

                            <i class="fa-solid fa-user-plus"></i>

                            Add Member

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

<style>

.glass-card{

background:rgba(255,255,255,.07);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.12);

border-radius:28px;

box-shadow:0 20px 60px rgba(0,0,0,.35);

}

.profile-icon{

height:90px;

width:90px;

border-radius:50%;

display:flex;

align-items:center;

justify-content:center;

background:linear-gradient(135deg,#ff8c00,#ff5e00);

font-size:35px;

color:white;

box-shadow:0 0 35px rgba(255,140,0,.4);

}

.floating-group{

position:relative;

}

.input-icon{

position:absolute;

left:18px;

top:18px;

color:#ff8c00;

z-index:10;

}

.glass-input{

background:rgba(255,255,255,.06);

border:1px solid rgba(255,255,255,.12);

border-radius:15px;

padding:16px 18px 16px 48px;

color:white;

}

.glass-input:focus{

background:rgba(255,255,255,.08);

border-color:#ff8c00;

box-shadow:0 0 20px rgba(255,140,0,.3);

color:white;

}

.glass-input::placeholder{

color:transparent;

}

.floating-group label{

position:absolute;

left:48px;

top:15px;

color:#bdbdbd;

transition:.3s;

pointer-events:none;

}

.glass-input:focus+label,

.glass-input:not(:placeholder-shown)+label{

top:-10px;

left:16px;

font-size:12px;

background:#1b1b1b;

padding:2px 8px;

border-radius:8px;

color:#ff8c00;

}

.btn-premium{

background:linear-gradient(135deg,#ff8c00,#ff5e00);

border:none;

border-radius:14px;

padding:14px 30px;

color:white;

font-weight:600;

transition:.35s;

}

.btn-premium:hover{

transform:translateY(-3px);

box-shadow:0 15px 35px rgba(255,140,0,.45);

color:white;

}

</style>

{% endblock %}
